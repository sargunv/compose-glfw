[settings]
experimental = true
pin = true
install_before = "3d"
lockfile = true

[tools]
"core:java" = "zulu-25"
"core:node" = "24.17.0"
"aqua:jdx/hk" = "1.48.0"
"aqua:dprint/dprint" = "0.54.0"
"aqua:facebook/ktfmt" = "0.63"
"aqua:rhysd/actionlint" = "1.7.12"
"aqua:koalaman/shellcheck" = "0.11.0"

[env]
LIBGL_ALWAYS_SOFTWARE = "1"
GALLIUM_DRIVER = "llvmpipe"

[tasks.check]
run = "hk check --all"

[tasks.fix]
run = "hk fix --all"

[tasks.build]
run = "./gradlew build"
run_windows = "gradlew.bat build"

[tasks.docs]
run = "./gradlew dokkaGenerate"
run_windows = "gradlew.bat dokkaGenerate"

[tasks.publish-local]
run = "./gradlew publishToMavenLocal -PsignAllPublications=false"
run_windows = "gradlew.bat publishToMavenLocal -PsignAllPublications=false"

[tasks.actions-up]
description = "Update and pin GitHub Actions steps."
run = "npx -y actions-up -y"

[tasks."ci:lint"]
run = [
  "hk fix --all",
  "git update-index -q --refresh",
  "git diff --exit-code -- . ':(exclude)mise.lock'",
  "git diff --cached --exit-code -- . ':(exclude)mise.lock'",
]

[tasks._ktfmt]
hide = true
run = 'java -jar {{ tools["aqua:facebook/ktfmt"].path }}/ktfmt'

[tasks."setup:graphics"]
description = "Install Mesa software EGL and Xvfb for headless Linux GLFW demo runs."
run = "./scripts/setup-graphics.sh"

[tasks.demo]
run = "./scripts/run-demo.sh"
run_windows = "gradlew.bat :compose-glfw-demo:run"

[tasks."demo:x11"]
run = "./scripts/run-demo.sh x11"

[hooks]
postinstall = ["hk install --mise"]
