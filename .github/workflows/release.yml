name: Release

"on":
  push:
    tags:
      - v*.*.*

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-maven:
    name: publish / maven central
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: maven-central
      url: https://central.sonatype.com/namespace/dev.sargunv
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: git fetch --tags --force
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          cache_key_prefix: mise-v1
          install: true
      - name: Publish to Maven Central
        run: >
          ./gradlew publishAndReleaseToMavenCentral
          -PcomposeGlfwVersion="${GITHUB_REF_NAME#v}"
          --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername:
            ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword:
            ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword:
            ${{ secrets.GPG_PASSPHRASE }}

  publish-pages:
    name: publish / github pages
    needs: [publish-maven]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: git fetch --tags --force
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          cache_key_prefix: mise-v1
          install: true
      - name: Build docs
        run: ./gradlew dokkaGenerate -PcomposeGlfwVersion="${GITHUB_REF_NAME#v}"
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/dokka/html
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        id: deploy-pages
